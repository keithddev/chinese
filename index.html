<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法夾公仔機：四字成語大挑戰 (錯題重練版)</title>
    <style>
        body {
            font-family: "Comic Sans MS", "Microsoft JhengHei", sans-serif;
            background-color: #ffe4e1;
            text-align: center;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        #game-container {
            background-color: #fff;
            border: 8px solid #ffb6c1;
            border-radius: 20px;
            max-width: 650px;
            margin: 0 auto;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        h1 { color: #ff69b4; }
        .score-board {
            font-size: 22px;
            font-weight: bold;
            color: #ff8c00;
            background: #fff8dc;
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 20px;
            border: 2px dashed #ff8c00;
        }
        .question-box {
            font-size: 22px;
            line-height: 1.6;
            margin: 15px 0;
            padding: 20px;
            background-color: #f0f8ff;
            border-radius: 15px;
            border: 2px solid #add8e6;
        }
        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .option-btn {
            background-color: #ffb6c1;
            color: white;
            border: none;
            padding: 15px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 0 #ff69b4;
            transition: transform 0.1s, box-shadow 0.1s, background-color 0.3s;
        }
        .option-btn:active:not(:disabled) {
            transform: translateY(5px);
            box-shadow: 0 0 0 #ff69b4;
        }
        .option-btn:hover:not(:disabled) { background-color: #ff69b4; }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.8; }

        .correct-btn { background-color: #32cd32 !important; box-shadow: 0 5px 0 #228b22 !important; animation: bounce 0.5s; }
        .wrong-btn { background-color: #ff4500 !important; box-shadow: 0 5px 0 #cc3700 !important; animation: shake 0.5s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        #explanation-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            text-align: left;
            font-size: 18px;
            line-height: 1.5;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .exp-correct { background-color: #e0ffe0; border: 2px solid #32cd32; }
        .exp-wrong { background-color: #ffe4e1; border: 2px solid #ff4500; }
        
        .next-btn {
            display: block;
            width: 100%;
            margin-top: 15px;
            background-color: #1e90ff;
            color: white;
            border: none;
            padding: 12px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 0 #0000cd;
        }
        .next-btn:active { transform: translateY(5px); box-shadow: 0 0 0 #0000cd; }
        
        .speak-btn {
            background-color: #ffd700;
            color: #b8860b;
            border: 2px solid #daa520;
            padding: 8px 15px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            box-shadow: 0 3px 0 #daa520;
        }
        .speak-btn:active { transform: translateY(3px); box-shadow: 0 0 0 #daa520; }

        #end-screen { display: none; }
        .mistake-list { text-align: left; background: #fff0f5; padding: 15px; border-radius: 10px; margin-top: 20px; }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🎀 魔法夾公仔機 🧸</h1>
    
    <div id="play-screen">
        <div class="score-board">分數: <span id="score">0</span> 🏆 | 題目: <span id="q-num">1</span>/<span id="q-total">20</span></div>
        <div class="question-box" id="question-text">載入題目中...</div>
        <div class="options-container" id="options"></div>
        
        <div id="explanation-box">
            <div id="exp-content"></div>
            <button class="next-btn" onclick="nextQuestion()">繼續夾公仔 ➡️</button>
        </div>
    </div>

    <div id="end-screen">
        <h2>🎉 遊戲結束！ 🎉</h2>
        <div class="score-board">
            答對: <span id="correct-count"></span> / <span id="total-count"></span> 題<br>
            總分: <span id="final-score"></span> 🏆
        </div>
        
        <div id="gacha-machine"></div>
        
        <div class="action-buttons">
            <button id="retry-btn" class="next-btn" style="background-color: #ff8c00; box-shadow: 0 5px 0 #cc7000; display:none;" onclick="startGame(true)">🎯 重做錯誤題目</button>
            <button class="next-btn" style="background-color: #32cd32; box-shadow: 0 5px 0 #228b22;" onclick="startGame(false)">🔄 再玩一次 (全部題目)</button>
        </div>
    </div>
</div>

<script>
    const idiomDict = {
        "開門見山": "一開始就直接講重點，唔會兜圈子。",
        "千變萬化": "變化非常之多，估佢唔到。",
        "栩栩如生": "整得好似真嘅一樣，非常生動。",
        "盲人摸象": "只係睇到事物嘅一小部分，就以為係全部。",
        "莫名其妙": "發生嘅事好奇怪，令人完全唔明白點解。",
        "三心兩意": "又想咁又想咁，攞唔定主意。",
        "一石二鳥": "做一件事，可以同時得到兩個好處。",
        "目中無人": "驕傲自大，睇唔起其他人。",
        "一視同仁": "對所有人都一樣咁好，唔會大細超。",
        "理直氣壯": "覺得自己啱，講嘢就好大聲、好有自信。",
        "家喻戶曉": "每家每戶都知道，非常出名。",
        "對牛彈琴": "對住唔明白嘅人講大道理，白費心機。",
        "口是心非": "把口講一套，心入面諗另一套。",
        "神通廣大": "本領好大，咩都做得到。",
        "真相大白": "事情嘅真正原因終於全部搞清楚晒。",
        "興高采烈": "非常之開心、興奮。",
        "蛛絲馬跡": "事情留低嘅隱蔽線索或者痕跡。",
        "美中不足": "雖然已經好好，但係仲有少少瑕疵或者遺憾。",
        "光明正大": "做事坦白、堂堂正正，唔會偷偷摸摸。",
        "非同小可": "事情好嚴重或者好重要，絕對唔可以睇小。"
    };

    const allQuestions = [
        { q: "這場演講時間有限，講者一上台就 ______ 地切入主題，完全不浪費時間。", a: "開門見山" },
        { q: "面對大自然 ______ 的景象，我不禁看得入神了。", a: "千變萬化" },
        { q: "這座蠟像館裏的明星像製作得 ______ ，讓遊客驚歎不已。", a: "栩栩如生" },
        { q: "如果我們只看數據的一小部分就下結論，這跟 ______ 有甚麼分別呢？", a: "盲人摸象" },
        { q: "他剛才還在生氣，現在卻突然大笑起來，真是讓人感到 ______ 。", a: "莫名其妙" },
        { q: "既然你決定要學鋼琴，就該專心練習，不可 ______ ，否則最後甚麼都學不會。", a: "三心兩意" },
        { q: "他這次出國交流，順便拜訪了多年未見的老友，真可謂 ______ 。", a: "一石二鳥" },
        { q: "他那種 ______ 的傲慢態度，讓在場的所有人都感到非常不舒服。", a: "目中無人" },
        { q: "老師對待班上的每一位同學都 ______ ，絕不會因為成績好壞而有差別待遇。", a: "一視同仁" },
        { q: "明明是他弄壞了東西，卻還 ______ 地指責別人，真是不可理喻。", a: "理直氣壯" },
        { q: "這位童話作家的故事 ______ ，幾乎每個小孩都聽過他的作品。", a: "家喻戶曉" },
        { q: "你跟一個完全不講道理的人爭辯，簡直就像是 ______ ，浪費口舌。", a: "對牛彈琴" },
        { q: "他總是 ______ ，明明肚子很餓，卻還客氣地說不餓。", a: "口是心非" },
        { q: "孫悟空 ______ ，翻一個筋斗就能飛到十萬八千里外。", a: "神通廣大" },
        { q: "媽媽找不到的錢包，原來是被弟弟藏起來了，現在終於 ______ 了。", a: "真相大白" },
        { q: "明天要去郊野公園遠足，大家都 ______ 地討論。", a: "興高采烈" },
        { q: "小貓雖然走得很輕，但地板上濕濕的腳印，就是牠偷跑進廚房的 ______ 。", a: "蛛絲馬跡" },
        { q: "小明在比賽中，雖然贏得第一名，但獎盃卻被摔破了一個小角，真是 ______ 。", a: "美中不足" },
        { q: "做人要 ______ ，不可以偷偷摸摸拿別人的東西。", a: "光明正大" },
        { q: "這次颱風的威力 ______ ，大家一定要做好防颱風準備，不能掉以輕心。", a: "非同小可" }
    ];

    const allIdioms = Object.keys(idiomDict);
    
    // 遊戲狀態變數
    let gameQuestions = []; 
    let currentScore = 0;
    let correctCount = 0; // 記錄答對題數
    let currentQuestionIndex = 0;
    let mistakeLog = [];

    function speakText(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            let msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-HK'; 
            msg.rate = 0.9;     
            window.speechSynthesis.speak(msg);
        }
    }

    // isRetry = true 代表只重做錯題；false 代表玩全部題目
    function startGame(isRetry = false) {
        if (isRetry && mistakeLog.length > 0) {
            // 將錯題紀錄轉換為題目格式
            gameQuestions = mistakeLog.map(item => ({ q: item.q, a: item.right }));
        } else {
            // 玩全部 20 題
            gameQuestions = [...allQuestions];
        }

        currentScore = 0;
        correctCount = 0;
        currentQuestionIndex = 0;
        mistakeLog = []; // 清空新的錯題本，準備記錄呢一局嘅錯題

        document.getElementById('q-total').innerText = gameQuestions.length;
        document.getElementById('end-screen').style.display = 'none';
        document.getElementById('play-screen').style.display = 'block';
        
        updateScore();
        loadQuestion();
    }

    function loadQuestion() {
        window.speechSynthesis.cancel();
        
        document.getElementById('explanation-box').style.display = 'none';
        document.getElementById('q-num').innerText = currentQuestionIndex + 1;
        
        let currentQ = gameQuestions[currentQuestionIndex];
        document.getElementById('question-text').innerHTML = currentQ.q.replace("______", "<b> [ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ] </b>");

        let options = [currentQ.a];
        while(options.length < 4) {
            let randomIdiom = allIdioms[Math.floor(Math.random() * allIdioms.length)];
            if(!options.includes(randomIdiom)) {
                options.push(randomIdiom);
            }
        }
        options.sort(() => Math.random() - 0.5);

        let optionsHtml = "";
        options.forEach(opt => {
            optionsHtml += `<button class="option-btn" id="btn-${opt}" onclick="checkAnswer('${opt}', this)">${opt}</button>`;
        });
        document.getElementById('options').innerHTML = optionsHtml;
    }

    function checkAnswer(selectedOpt, btnElement) {
        let allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(btn => btn.disabled = true);

        let currentQ = gameQuestions[currentQuestionIndex];
        let expBox = document.getElementById('explanation-box');
        let expContent = document.getElementById('exp-content');
        
        let speakString = ""; 

        if (selectedOpt === currentQ.a) {
            currentScore += 10;
            correctCount++; // 答對題數 +1
            btnElement.classList.add('correct-btn');
            expBox.className = 'exp-correct';
            
            speakString = `答啱啦！${currentQ.a}，意思係：${idiomDict[currentQ.a]}`;
            
            expContent.innerHTML = `
                <h3 style="color:#228b22; margin-top:0;">🟢 答啱啦！好犀利！ (+10分)</h3>
                <p><b>【${currentQ.a}】</b>嘅意思係：<br>👉 ${idiomDict[currentQ.a]}</p>
                <button class="speak-btn" onclick="speakText('${speakString}')">🔊 聽廣東話解說</button>
            `;
            speakText(speakString); 
            
        } else {
            currentScore -= 5;
            btnElement.classList.add('wrong-btn');
            document.getElementById(`btn-${currentQ.a}`).classList.add('correct-btn');
            
            expBox.className = 'exp-wrong';
            
            speakString = `哎呀，答錯啦。你揀咗${selectedOpt}，意思其實係：${idiomDict[selectedOpt]}。正確答案應該係${currentQ.a}，意思係：${idiomDict[currentQ.a]}`;
            
            expContent.innerHTML = `
                <h3 style="color:#ff0000; margin-top:0;">🔴 哎呀，爪子滑掉啦！ (-5分)</h3>
                <p>你揀咗<b>【${selectedOpt}】</b>，佢嘅意思其實係：<br>🙅‍♀️ ${idiomDict[selectedOpt]}</p>
                <hr style="border:1px dashed #ffb6c1;">
                <p>正確答案應該係<b>【${currentQ.a}】</b>，意思係：<br>✅ ${idiomDict[currentQ.a]}</p>
                <button class="speak-btn" onclick="speakText('${speakString}')">🔊 聽廣東話解說</button>
            `;
            // 記錄錯題
            mistakeLog.push({ q: currentQ.q, wrong: selectedOpt, right: currentQ.a });
        }
        
        updateScore();
        expBox.style.display = 'block';
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < gameQuestions.length) {
            loadQuestion();
        } else {
            endGame();
        }
    }

    function updateScore() {
        document.getElementById('score').innerText = currentScore;
    }

    function endGame() {
        window.speechSynthesis.cancel();
        document.getElementById('play-screen').style.display = 'none';
        document.getElementById('end-screen').style.display = 'block';
        
        // 更新結算分數與題數
        document.getElementById('correct-count').innerText = correctCount;
        document.getElementById('total-count').innerText = gameQuestions.length;
        document.getElementById('final-score').innerText = currentScore;

        let gachaEl = document.getElementById('gacha-machine');
        let retryBtn = document.getElementById('retry-btn');
        
        if (mistakeLog.length === 0) {
            gachaEl.innerHTML = "<h3>🌟 太神啦！滿分通關！所有題目都答啱晒！ 🌟</h3>";
            speakText("太神啦！滿分通關！所有題目都答啱晒！");
            retryBtn.style.display = "none"; // 全對就隱藏重做按鈕
        } else {
            let mistakeHtml = "<h3>📖 魔法錯題扭蛋機 (幫你記低咗錯邊啲)：</h3><div class='mistake-list'>";
            mistakeLog.forEach((item, index) => {
                let text = item.q.replace("______", `<u style="color:red;"><b>${item.right}</b></u>`);
                let reviewSpeak = `第${index + 1}題，${item.right}，意思係${idiomDict[item.right]}`;
                mistakeHtml += `
                    <div style="margin-bottom:15px; border-bottom:1px dashed #ccc; padding-bottom:10px;">
                        <b>第 ${index + 1} 顆扭蛋：</b><br>${text}<br>
                        <span style='color:gray; font-size:16px;'>👉 記住啦：<b>${item.right}</b> 嘅意思係「${idiomDict[item.right]}」</span><br>
                        <button class="speak-btn" style="margin-top:5px; font-size:14px; padding:5px 10px;" onclick="speakText('${reviewSpeak}')">🔊 聽發音</button>
                    </div>`;
            });
            mistakeHtml += "</div>";
            gachaEl.innerHTML = mistakeHtml;
            retryBtn.style.display = "block"; // 有錯題就顯示重做按鈕
        }
    }

    // 初始化啟動遊戲 (預設玩全部)
    startGame(false);
</script>

</body>
</html>
